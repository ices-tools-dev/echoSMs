name: Build documentation
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: pip install mkdocs mkdocstrings[python] mkdocs-material mkdocs-glightbox
      - run: mkdocs gh-deploy --force --clean --verbose
      
